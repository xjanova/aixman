<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AETHER · ทอความฝันจากเส้นใยแห่งความคิด</title>
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { margin: 0; padding: 0; background: #030612; color: #f1f5f9; font-family: 'Noto Sans Thai', 'Inter', system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { overflow-x: hidden; }
  * { box-sizing: border-box; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes blink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes floatY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

  /* ═══ RESPONSIVE ═══ */
  /* Tablet ≤ 1024px */
  @media (max-width: 1024px) {
    .rp-nav { padding: 14px 20px !important; }
    .rp-nav-links { gap: 16px !important; font-size: 12px !important; }
    .rp-nav-badge { display: none !important; }
    .rp-nav-brand { font-size: 12px !important; letter-spacing: 0.18em !important; }
    .rp-nav-cta-primary { padding: 8px 14px !important; font-size: 12px !important; white-space: nowrap !important; }
    .rp-nav-cta-ghost { padding: 7px 12px !important; font-size: 12px !important; white-space: nowrap !important; }
    .rp-hero-logo-wrap { position: static !important; flex-direction: row !important; justify-content: flex-end !important; margin-bottom: 24px !important; }
    .rp-hero-logo { width: 80px !important; height: 80px !important; border-radius: 18px !important; }
    .rp-container { padding: 0 24px !important; }
    .rp-studio { grid-template-columns: 280px 1fr !important; }
    .rp-studio-right { display: none !important; }
    .rp-studio-center { min-width: 0 !important; width: 100% !important; height: auto !important; }
    .rp-docs { grid-template-columns: 220px 1fr !important; }
    .rp-docs-right { display: none !important; }
    .rp-docs-center { min-width: 0 !important; }
    .rp-grid-4 { grid-template-columns: repeat(2, 1fr) !important; }
    .rp-grid-3 { grid-template-columns: repeat(2, 1fr) !important; }
    .rp-gallery-mason { column-count: 3 !important; }
    .rp-dash-main { grid-template-columns: 1fr !important; }
    .rp-stat-4 { grid-template-columns: repeat(2, 1fr) !important; }
    .rp-stat-strip { gap: 24px !important; }
  }
  /* Mobile ≤ 720px */
  @media (max-width: 720px) {
    .rp-nav { padding: 14px 18px !important; }
    .rp-nav-links { display: none !important; }
    .rp-hero-logo-wrap { position: static !important; margin: 0 auto 24px !important; }
    .rp-hero-logo { width: 100px !important; height: 100px !important; }
    .rp-container { padding: 0 18px !important; }
    .rp-studio { grid-template-columns: 1fr !important; }
    .rp-studio-left { height: auto !important; border-right: none !important; border-bottom: 1px solid rgba(255,255,255,0.06) !important; }
    .rp-studio-center { height: auto !important; }
    .rp-docs { grid-template-columns: 1fr !important; }
    .rp-docs-left { display: none !important; }
    .rp-grid-4 { grid-template-columns: 1fr !important; }
    .rp-grid-3 { grid-template-columns: 1fr !important; }
    .rp-grid-2 { grid-template-columns: 1fr !important; }
    .rp-gallery-mason { column-count: 2 !important; }
    .rp-stat-4 { grid-template-columns: repeat(2, 1fr) !important; gap: 12px !important; }
    .rp-stat-strip { gap: 20px !important; }
    .rp-prompt-row { flex-wrap: wrap !important; }
    .rp-gen-tray { grid-template-columns: repeat(2, 1fr) !important; }
    .rp-hero-h1 { font-size: 48px !important; }
    .rp-h2 { font-size: 36px !important; }
    .rp-history { grid-template-columns: repeat(4, 1fr) !important; }
    .rp-mode-tabs { flex-wrap: wrap !important; }
    .rp-filter-row { flex-direction: column !important; align-items: flex-start !important; }
    .rp-section { padding-left: 18px !important; padding-right: 18px !important; padding-top: 64px !important; padding-bottom: 64px !important; }
  }
  button:hover { filter: brightness(1.1); }
  button { transition: all 250ms cubic-bezier(0.4,0,0.2,1); font-family: inherit; }
  button:hover:not(:disabled) { transform: translateY(-1px); }
  a { transition: color 200ms; }
  a:hover { color: #fff !important; }
  ::selection { background: rgba(139, 92, 246, 0.4); }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.16); }

  /* Fix Thai italic descender clipping — extra breathing room */
  h1 span[style*="italic"], h2 span[style*="italic"], h1 > span, h2 > span {
    padding-bottom: 0.15em;
    padding-right: 0.08em;
    display: inline-block;
  }
  /* noise overlay for dreamy texture */
  .noise {
    position: fixed; inset: 0; pointer-events: none; z-index: 100;
    opacity: 0.03; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='3' seed='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }

  /* page transitions */
  .page-enter { animation: pageIn 400ms cubic-bezier(0.4,0,0.2,1); }
  @keyframes pageIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="root"></div>
<div class="noise"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="fiber-threads.jsx"></script>
<script type="text/babel" src="sections.jsx"></script>
<script type="text/babel" src="banner-slider.jsx"></script>
<script type="text/babel" src="sections-b.jsx"></script>
<script type="text/babel" src="pages.jsx"></script>

<script type="text/babel">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "hueShift": 70,
  "threadsDensity": 20,
  "threadsSpeed": 0.2,
  "brandName": "X-DREAMER"
}/*EDITMODE-END*/;

const { TweaksPanel, TweakSection, TweakSlider, TweakText, useTweaks } = window;
const { Nav, Hero, Gallery, Features, HowItWorks, Pricing, FooterCTA, FiberThreads, BannerSlider } = window;
const { StudioPage, DashboardPage, GalleryDetailPage, AboutPage, AuthPage, DocsPage } = window;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [page, setPage] = React.useState(() => (window.location.hash || '#home').slice(1) || 'home');
  const [scrollY, setScrollY] = React.useState(0);
  const [user, setUser] = React.useState(() => {
    try { return JSON.parse(localStorage.getItem('aether_user') || 'null'); } catch { return null; }
  });

  const login = (u) => {
    const profile = u || { name: 'ฝันทิพย์', email: 'dreamer@aether.co' };
    setUser(profile);
    try { localStorage.setItem('aether_user', JSON.stringify(profile)); } catch {}
    window.location.hash = 'dashboard';
  };
  const logout = () => {
    setUser(null);
    try { localStorage.removeItem('aether_user'); } catch {}
    window.location.hash = 'home';
  };

  React.useEffect(() => {
    const onHash = () => {
      const p = (window.location.hash || '#home').slice(1) || 'home';
      setPage(p);
      window.scrollTo({ top: 0, behavior: 'instant' });
    };
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  React.useEffect(() => {
    let raf;
    const onScroll = () => {
      if (raf) return;
      raf = requestAnimationFrame(() => {
        setScrollY(window.scrollY);
        raf = null;
      });
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const nav = (p) => { window.location.hash = p; };

  // Hero-prominence only when on home AND near the top
  // heroAmount 1 at top, 0 after ~600px scroll
  const heroAmount = page === 'home' ? Math.max(0, 1 - scrollY / 600) : 0;
  // base ambient opacity (low always); hero boost adds on top
  const baseOpacity = 0.28;
  const heroBoost = heroAmount * 0.55;

  const renderPage = () => {
    switch (page) {
      case 'studio': return <StudioPage hueShift={tweaks.hueShift} />;
      case 'dashboard': return <DashboardPage hueShift={tweaks.hueShift} />;
      case 'gallery': return <GalleryDetailPage hueShift={tweaks.hueShift} />;
      case 'about': return <AboutPage hueShift={tweaks.hueShift} />;
      case 'docs': return <DocsPage hueShift={tweaks.hueShift} />;
      case 'login': return <AuthPage hueShift={tweaks.hueShift} mode="login" onAuth={login} />;
      case 'signup': return <AuthPage hueShift={tweaks.hueShift} mode="signup" onAuth={login} />;
      case 'home':
      default:
        return <>
          <Hero hueShift={tweaks.hueShift} noCanvas />
          <BannerSlider hueShift={tweaks.hueShift} />
          <Features hueShift={tweaks.hueShift} />
          <Gallery hueShift={tweaks.hueShift} />
          <HowItWorks hueShift={tweaks.hueShift} />
          <Pricing hueShift={tweaks.hueShift} />
          <FooterCTA hueShift={tweaks.hueShift} />
        </>;
    }
  };

  return (
    <div style={{ position: 'relative' }}>
      {/* Global fixed background — one canvas for the whole app */}
      <div style={{
        position: 'fixed', inset: 0, zIndex: 0, pointerEvents: 'none',
        opacity: baseOpacity + heroBoost,
        transition: 'opacity 120ms linear',
      }}>
        <FiberThreads
          density={tweaks.threadsDensity}
          speed={tweaks.threadsSpeed}
          hueShift={tweaks.hueShift}
          opacity={1}
          interactive={page === 'home' && heroAmount > 0.3}
        />
      </div>

      {/* "Frosted glass" that gradually intensifies as you scroll — fixed so it sits behind content everywhere */}
      <div style={{
        position: 'fixed', inset: 0, zIndex: 0, pointerEvents: 'none',
        background: `radial-gradient(ellipse at 50% 30%, rgba(3,6,18,${0.15 + (1-heroAmount)*0.35}) 0%, rgba(3,6,18,${0.55 + (1-heroAmount)*0.3}) 55%, rgba(3,6,18,${0.85}) 100%)`,
        backdropFilter: `blur(${(1 - heroAmount) * 6}px)`,
        WebkitBackdropFilter: `blur(${(1 - heroAmount) * 6}px)`,
        transition: 'backdrop-filter 150ms linear',
      }} />

      <div style={{ position: 'relative', zIndex: 1 }}>
        <Nav brand={tweaks.brandName} page={page} onNav={nav} loggedIn={!!user} user={user} onLogout={logout} />
        <div key={page} className="page-enter">
          {renderPage()}
        </div>
      </div>

      <TweaksPanel>
        <TweakSection label="Navigation" />
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 4, padding: '0 0 4px' }}>
          {[
            { id: 'home', l: 'Landing' },
            { id: 'studio', l: 'Studio' },
            { id: 'dashboard', l: 'Dashboard' },
            { id: 'gallery', l: 'Gallery' },
            { id: 'docs', l: 'Docs' },
            { id: 'about', l: 'About' },
            { id: 'login', l: 'Login' },
            { id: 'signup', l: 'Signup' },
          ].map(p => (
            <button key={p.id} onClick={() => nav(p.id)} style={{
              padding: '6px 8px', borderRadius: 6, fontSize: 11,
              background: page === p.id ? 'rgba(139,92,246,0.2)' : 'rgba(0,0,0,0.04)',
              color: page === p.id ? '#29261b' : '#29261b',
              border: '1px solid rgba(0,0,0,0.08)',
              cursor: 'pointer', fontFamily: 'inherit',
              fontWeight: page === p.id ? 600 : 400,
            }}>{p.l}</button>
          ))}
        </div>
        <TweakSection label="Mood & Palette" />
        <TweakSlider label="Hue shift" value={tweaks.hueShift} min={-90} max={90} step={5}
          onChange={v => setTweak('hueShift', v)} unit="°" />
        <TweakText label="Brand name" value={tweaks.brandName} onChange={v => setTweak('brandName', v)} />
        <TweakSection label="Fiber threads" />
        <TweakSlider label="Density" value={tweaks.threadsDensity} min={20} max={150} step={5}
          onChange={v => setTweak('threadsDensity', v)} />
        <TweakSlider label="Speed" value={tweaks.threadsSpeed} min={0.2} max={2.5} step={0.1}
          onChange={v => setTweak('threadsSpeed', v)} unit="x" />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
