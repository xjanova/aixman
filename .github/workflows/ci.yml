name: CI - Build & Quality Checks

on:
  push:
    branches:
      - main
      - develop
      - 'claude/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-check:
    name: Build & TypeScript Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build production
        run: npm run build
        env:
          DATABASE_URL: "mysql://ci:ci@localhost:3306/ci"
          NEXTAUTH_SECRET: "ci-test-secret-not-real-at-all-32chars"
          NEXTAUTH_URL: "http://localhost:3000"
          ENCRYPTION_KEY: "ci-test-encryption-key-32-chars!"

      - name: Check build output
        run: |
          if [ ! -d ".next" ]; then
            echo "Build output not found!"
            exit 1
          fi
          echo "Build completed successfully"

  # Auto-release when all checks pass on main branch
  auto-release:
    name: Auto Release
    runs-on: ubuntu-latest
    needs: [build-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: auto-release
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if release needed
        id: check
        run: |
          LAST_AUTHOR=$(git log -1 --format='%an')
          if [[ "$LAST_AUTHOR" == "github-actions[bot]" ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping: last commit from bot"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install semver
        if: steps.check.outputs.skip != 'true'
        run: npm install -g semver

      - name: Bump version and commit
        id: release
        if: steps.check.outputs.skip != 'true'
        run: |
          if [ -f VERSION ]; then
            CURRENT=$(cat VERSION | tr -d '[:space:]')
          else
            CURRENT="0.0.0"
          fi

          NEW=$(semver -i patch "$CURRENT")
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "current=$CURRENT" >> $GITHUB_OUTPUT

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          echo "$NEW" > VERSION
          git add VERSION
          git commit -m "chore: release v$NEW"

          git pull --rebase origin main
          git push origin main

          echo "Released v$NEW (from $CURRENT)"

      - name: Create and push tag
        if: steps.check.outputs.skip != 'true'
        run: |
          VERSION="v${{ steps.release.outputs.new }}"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release.outputs.new }}
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
