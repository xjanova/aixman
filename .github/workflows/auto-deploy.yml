name: Auto Deploy to Production

on:
  # Deploy after CI completes successfully on main
  workflow_run:
    workflows: ["CI - Build & Quality Checks"]
    types:
      - completed
    branches:
      - main

  # Manual trigger
  workflow_dispatch:
    inputs:
      skip_ci:
        description: 'Skip CI checks (fast deploy)'
        required: false
        default: 'false'
        type: boolean

# Prevent concurrent deployments
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Check SSH secrets
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$SSH_HOST" ] || [ -z "$SSH_USER" ] || [ -z "$SSH_PRIVATE_KEY" ]; then
            echo "::error::Required SSH secrets are not configured."
            echo "Please set: SSH_HOST, SSH_USER, SSH_PRIVATE_KEY"
            exit 1
          fi
          echo "SSH secrets configured"

      - name: Deploy via SSH (git pull + build + pm2)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          command_timeout: 10m
          envs: DATABASE_URL,AUTH_SECRET
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        script: |
            set -e

            # Configuration
            DEPLOY_PATH="/home/admin/domains/ai.xman4289.com"
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

            echo "Starting deployment to ${DEPLOY_PATH}"
            cd "${DEPLOY_PATH}"

            # Backup .env
            cp .env .env.backup.$(date +%Y%m%d_%H%M%S) 2>/dev/null || true

            # Pull latest code
            echo "Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # Ensure .env exists with required variables
            if [ ! -f .env ]; then
              echo "Creating .env from template..."
              cp .env.example .env 2>/dev/null || touch .env
            fi

            # Set/update critical env vars (idempotent)
            grep -q '^NEXTAUTH_URL=' .env && sed -i 's|^NEXTAUTH_URL=.*|NEXTAUTH_URL=https://ai.xman4289.com|' .env || echo 'NEXTAUTH_URL=https://ai.xman4289.com' >> .env
            grep -q '^NEXT_PUBLIC_APP_URL=' .env && sed -i 's|^NEXT_PUBLIC_APP_URL=.*|NEXT_PUBLIC_APP_URL=https://ai.xman4289.com|' .env || echo 'NEXT_PUBLIC_APP_URL=https://ai.xman4289.com' >> .env
            grep -q '^AUTH_TRUST_HOST=' .env || echo 'AUTH_TRUST_HOST=true' >> .env

            # Set AUTH_SECRET from GitHub secret
            if [ -n "$AUTH_SECRET" ]; then
              grep -q '^AUTH_SECRET=' .env && sed -i "s|^AUTH_SECRET=.*|AUTH_SECRET=${AUTH_SECRET}|" .env || echo "AUTH_SECRET=${AUTH_SECRET}" >> .env
              grep -q '^NEXTAUTH_SECRET=' .env && sed -i "s|^NEXTAUTH_SECRET=.*|NEXTAUTH_SECRET=${AUTH_SECRET}|" .env || echo "NEXTAUTH_SECRET=${AUTH_SECRET}" >> .env
            fi

            # Set DATABASE_URL from GitHub secret or derive from xmanstudio .env
            if [ -n "$DATABASE_URL" ]; then
              grep -q '^DATABASE_URL=' .env && sed -i "s|^DATABASE_URL=.*|DATABASE_URL=${DATABASE_URL}|" .env || echo "DATABASE_URL=${DATABASE_URL}" >> .env
            elif ! grep -q '^DATABASE_URL=' .env; then
              # Read DB credentials from xmanstudio's .env (same server, shared DB)
              XMAN_ENV="/home/admin/domains/xman4289.com/.env"
              if [ -f "$XMAN_ENV" ]; then
                DB_HOST=$(grep '^DB_HOST=' "$XMAN_ENV" | cut -d= -f2)
                DB_PORT=$(grep '^DB_PORT=' "$XMAN_ENV" | cut -d= -f2)
                DB_DATABASE=$(grep '^DB_DATABASE=' "$XMAN_ENV" | cut -d= -f2)
                DB_USERNAME=$(grep '^DB_USERNAME=' "$XMAN_ENV" | cut -d= -f2)
                DB_PASSWORD=$(grep '^DB_PASSWORD=' "$XMAN_ENV" | cut -d= -f2)
                echo "DATABASE_URL=mysql://${DB_USERNAME}:${DB_PASSWORD}@${DB_HOST:-127.0.0.1}:${DB_PORT:-3306}/${DB_DATABASE:-xmanstudio}" >> .env
                echo "Derived DATABASE_URL from xmanstudio config"
              fi
            fi

            # Install dependencies
            echo "Installing dependencies..."
            npm ci 2>&1 || {
              echo "npm ci failed, trying npm install"
              npm install --production
            }

            # Generate Prisma client
            echo "Generating Prisma client..."
            npx prisma generate

            # Push database schema (safe - no data loss)
            echo "Syncing database schema..."
            npx prisma db push --skip-generate 2>&1 || echo "Schema push warning (non-fatal)"

            # Build production
            echo "Building production..."
            npm run build

            # Restart with PM2
            echo "Restarting application..."
            if pm2 describe aixman > /dev/null 2>&1; then
              pm2 restart aixman
            else
              pm2 start node_modules/.bin/next --name "aixman" -- start -p 3001
            fi

            # Save PM2 process list
            pm2 save

            # Wait for startup
            sleep 3

            # Health check
            if curl -sf http://localhost:3001 > /dev/null 2>&1; then
              echo "Application is running"
            else
              echo "Warning: Local health check failed (may need more time)"
              pm2 logs aixman --lines 20 --nostream || true
            fi

            echo "Deployment completed successfully!"

      - name: Health Check
        run: |
          echo "Checking health at: https://ai.xman4289.com"
          sleep 10
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://ai.xman4289.com" || echo "000")
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 308 ] || [ "$HTTP_CODE" -eq 301 ]; then
            echo "Application is healthy (HTTP $HTTP_CODE)"
          else
            echo "Health check returned HTTP $HTTP_CODE (may still be starting up)"
          fi

      - name: Deployment Summary
        if: always()
        run: |
          echo "## Deployment Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo "**Status:** Success" >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status:** Failed" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**URL:** https://ai.xman4289.com" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u)" >> $GITHUB_STEP_SUMMARY
